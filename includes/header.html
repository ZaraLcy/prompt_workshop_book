<!-- Custom styles for Prompt Workshop Book -->
<style>
/* ===== Copy Button for Prompt Cards ===== */
.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  padding: 4px 8px;
  font-size: 12px;
  background: #6c757d;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  opacity: 0.7;
  transition: opacity 0.2s;
  z-index: 10;
}

.copy-btn:hover {
  opacity: 1;
  background: #5a6268;
}

.copy-btn.copied {
  background: #28a745;
}

.prompt-block {
  position: relative;
  margin: 1em 0;
}

/* ===== Term Glossary Tooltip ===== */
.term {
  border-bottom: 1px dotted #6c757d;
  cursor: help;
  position: relative;
}

[data-tooltip] {
  position: relative;
}

[data-tooltip]:hover::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  padding: 8px 12px;
  background: #333;
  color: white;
  font-size: 13px;
  border-radius: 4px;
  white-space: nowrap;
  z-index: 100;
  margin-bottom: 8px;
  max-width: 300px;
  white-space: normal;
  text-align: left;
}

/* ===== Learning Checklist ===== */
.learning-checklist {
  background: #f8f9fa;
  padding: 20px;
  border-radius: 8px;
  margin: 2em 0;
}

.learning-checklist h4 {
  margin-top: 0;
  color: #2c3e50;
}

.learning-checklist label {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  cursor: pointer;
  border-bottom: 1px solid #e9ecef;
}

.learning-checklist label:last-of-type {
  border-bottom: none;
}

.learning-checklist input[type="checkbox"] {
  width: 18px;
  height: 18px;
  cursor: pointer;
}

.learning-checklist input[type="checkbox"]:checked + span {
  text-decoration: line-through;
  color: #6c757d;
}

.learning-checklist .reset-btn {
  margin-top: 15px;
  padding: 6px 12px;
  font-size: 13px;
  background: #e9ecef;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

.learning-checklist .reset-btn:hover {
  background: #dee2e6;
}

/* ===== Video Section ===== */
.video-section {
  background: #f8f9fa;
  padding: 15px;
  border-radius: 8px;
  margin: 1.5em 0;
}

.video-section summary {
  cursor: pointer;
  font-weight: 600;
  color: #2c3e50;
  padding: 5px 0;
}

.video-section summary:hover {
  color: #3498db;
}

video {
  width: 100%;
  border-radius: 4px;
  margin-top: 10px;
}

/* ===== Timestamp Links ===== */
.timestamp {
  font-size: 0.85em;
  color: #6c757d;
  text-decoration: none;
  margin-left: 8px;
}

.timestamp:hover {
  color: #3498db;
}

/* ===== Subtitle Feedback ===== */
.report-btn {
  font-size: 12px;
  color: #6c757d;
  background: none;
  border: 1px solid #dee2e6;
  padding: 2px 8px;
  border-radius: 4px;
  cursor: pointer;
  margin-left: 8px;
}

.report-btn:hover {
  background: #e9ecef;
  color: #495057;
}

.subtitle-form {
  display: none;
  margin-top: 10px;
  padding: 15px;
  background: #fff3cd;
  border-radius: 4px;
  border: 1px solid #ffc107;
}

.subtitle-form.active {
  display: block;
}

.subtitle-form textarea {
  width: 100%;
  min-height: 60px;
  margin-bottom: 10px;
  padding: 8px;
  border: 1px solid #dee2e6;
  border-radius: 4px;
  font-family: inherit;
}

.subtitle-form .error-types {
  margin-bottom: 10px;
}

.subtitle-form .error-types label {
  margin-right: 15px;
  cursor: pointer;
}

.subtitle-form .copy-revision {
  padding: 6px 12px;
  background: #28a745;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

.subtitle-form .copy-revision:hover {
  background: #218838;
}

/* ===== QR Code Section ===== */
.qr-section {
  text-align: center;
  margin: 2em 0;
  padding: 20px;
  background: #f8f9fa;
  border-radius: 8px;
}

.qr-section img {
  max-width: 150px;
  margin: 10px 0;
}
</style>

<!-- Clipboard.js -->
<script src="https://cdn.jsdelivr.net/npm/clipboard@2.0.11/dist/clipboard.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // ===== Copy Button Initialization =====
  var copyBtns = document.querySelectorAll('.copy-btn');
  copyBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var codeBlock = btn.closest('.prompt-block').querySelector('code');
      var text = codeBlock.textContent;
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = '已複製!';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.textContent = '複製';
          btn.classList.remove('copied');
        }, 2000);
      }).catch(function() {
        btn.textContent = '選取文字複製';
      });
    });
  });

  // ===== Learning Checklist with localStorage =====
  var checkboxes = document.querySelectorAll('.learning-checklist input[type="checkbox"]');
  var checklistId = window.location.pathname;
  
  // Load saved state
  var savedState = JSON.parse(localStorage.getItem('checklist_' + checklistId) || '{}');
  checkboxes.forEach(function(cb) {
    if (savedState[cb.name]) {
      cb.checked = true;
    }
  });

  // Save state on change
  checkboxes.forEach(function(cb) {
    cb.addEventListener('change', function() {
      savedState[cb.name] = cb.checked;
      localStorage.setItem('checklist_' + checklistId, JSON.stringify(savedState));
    });
  });

  // Reset button
  var resetBtn = document.querySelector('.learning-checklist .reset-btn');
  if (resetBtn) {
    resetBtn.addEventListener('click', function() {
      checkboxes.forEach(function(cb) {
        cb.checked = false;
      });
      localStorage.removeItem('checklist_' + checklistId);
    });
  }

  // ===== Report Button =====
  var reportBtns = document.querySelectorAll('.report-btn');
  reportBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var form = btn.nextElementSibling;
      if (form && form.classList.contains('subtitle-form')) {
        form.classList.toggle('active');
      }
    });
  });

  // Copy revision button
  var copyRevisionBtns = document.querySelectorAll('.copy-revision');
  copyRevisionBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var form = btn.closest('.subtitle-form');
      var textarea = form.querySelector('textarea');
      navigator.clipboard.writeText(textarea.value).then(function() {
        btn.textContent = '已複製!';
        setTimeout(function() {
          btn.textContent = '複製修訂';
        }, 2000);
      });
    });
  });
});
</script>
